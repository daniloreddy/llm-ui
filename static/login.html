<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM UI — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 340px;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e2e8f0;
      text-align: center;
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }
    .error {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    label {
      display: block;
      font-size: 0.75rem;
      color: #94a3b8;
      margin-bottom: 0.35rem;
    }
    input[type="password"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #6366f1; }
    button[type="submit"] {
      width: 100%;
      margin-top: 1rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>LLM UI</h1>
    <div id="err" class="error">Password errata o accesso bloccato.</div>
    <form method="POST" action="/auth/login">
      <label for="pwd">Password</label>
      <input type="password" id="pwd" name="password" autofocus autocomplete="current-password" />
      <button type="submit">Accedi</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).has('error')) {
      document.getElementById('err').style.display = 'block';
    }
  </script>
</body>
</html>
